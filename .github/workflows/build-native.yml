name: Build native binaries

# Builds single-file native artifacts for Windows and macOS using
# PyInstaller.  PyInstaller cannot cross-compile, so each target OS
# is built on its own runner and uploaded as a workflow artifact.
#
# Trigger options:
#   * Push a tag like  v1.0.0       → builds + (optionally) attaches to a release
#   * Manual dispatch from the Actions tab
#   * Pushes to main / add-combat   (sanity check the build still works)

on:
  push:
    branches: [main, add-combat]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: CompProgGame-windows
            artifact_path: dist/CompProgGame.exe
          - os: macos-latest
            artifact_name: CompProgGame-macos
            # PyInstaller --windowed on macOS produces a .app bundle.
            # We zip it so GitHub keeps it as one downloadable file
            # (and so the executable bit on the inner binary is
            # preserved through the artifact upload).
            artifact_path: dist/CompProgGame.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install runtime + build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build native artifact
        run: python tools/build_native.py

      # macOS only: zip the .app bundle so it travels as a single file.
      - name: Zip .app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r CompProgGame-macos.zip CompProgGame.app
          ls -lh

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/CompProgGame.exe
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/CompProgGame-macos.zip
          if-no-files-found: error

  # Optional: when you push a tag like v1.2.3, attach both binaries
  # to a GitHub Release automatically.
  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CompProgGame-windows/CompProgGame.exe
            artifacts/CompProgGame-macos/CompProgGame-macos.zip
